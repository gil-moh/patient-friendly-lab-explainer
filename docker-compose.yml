services:
  iris:
    build: .
    image: patient-lab-explainer:latest
    ports:
      - "52773:52773"
      - "1972:1972"
    volumes:
      - ./keys:/external/keys
    command: -k /external/keys/iris-container-x64.key
    environment:
      - FHIR_BASE_URL=${FHIR_BASE_URL:-http://localhost:52773/fhir/r4}
      - FHIR_BASIC_USER=${FHIR_BASIC_USER:-}
      - FHIR_BASIC_PASS=${FHIR_BASIC_PASS:-}
      - FHIR_BEARER_TOKEN=${FHIR_BEARER_TOKEN:-}
