services:
  iris:
    build: .
    image: patient-lab-explainer:latest
    ports:
      - "52773:52773"
      - "1972:1972"
    volumes:
      - ./keys:/external/keys
    command: -k /external/keys/iris-container-x64.key
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - FHIR_BASE_URL=${FHIR_BASE_URL:-http://host.docker.internal:52773/fhir/r4}
      - FHIR_BASIC_USER=${FHIR_BASIC_USER:-_SYSTEM}
      - FHIR_BASIC_PASS=${FHIR_BASIC_PASS:-SYS}
      - FHIR_BEARER_TOKEN=${FHIR_BEARER_TOKEN:-}
